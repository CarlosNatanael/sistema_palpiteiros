{% extends 'base.html' %}

{% block title %}Palpite Campeão{% endblock %}

{% block styles %}
<!-- Mantemos apenas o seu CSS específico -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/adipalpites.css') }}">
{% endblock %}

{% block content %}
<div class="container mx-auto" style="padding-top: 40px; max-width: 800px;">
    <h1 class="text-center mb-4 fw-bold text-success">PALPITE DE CAMPEÃO</h1>

    <div class="card shadow-sm border-0 mb-4 p-4">
        <form id="filtroCampeonatoForm" action="{{ url_for('palpite_campeao') }}" method="GET">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-group">
                <label for="campeonato_selecionado" class="mb-2 text-muted"><strong>1. Escolha o Campeonato:</strong></label>
                <!-- Usando form-select-lg nativo do Bootstrap 5 -->
                <select id="campeonato_selecionado" name="campeonato_selecionado" class="form-select form-select-lg" onchange="this.form.submit()">
                    <option value="" disabled {% if not campeonato_selecionado %}selected{% endif %}>Selecione um campeonato...</option>
                    {% for camp in campeonatos %}
                    <option value="{{ camp }}" {% if camp == campeonato_selecionado %}selected{% endif %}>{{ camp }}</option>
                    {% endfor %}
                </select>
            </div>
        </form>
    </div>

    {% if campeonato_selecionado %}
    <div class="card shadow-sm border-0 p-4">
        <form id="palpiteForm" action="{{ url_for('palpite_campeao') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="campeonato_selecionado" value="{{ campeonato_selecionado }}">

            <div class="form-group mb-4">
                <label for="nome" class="mb-2 text-muted"><strong>2. Seu Nome:</strong></label>
                <select id="nome" name="nome" class="form-select form-select-lg" required>
                    <option value="" disabled selected>Selecione seu nome</option>
                    {% for palpiteiro in palpiteiros %}
                    <option value="{{ palpiteiro }}">{{ palpiteiro }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group mb-4">
                <label for="time_campeao" class="mb-2 text-muted"><strong>3. Seu Palpite para Campeão de {{ campeonato_selecionado }}:</strong></label>
                <select id="time_campeao" name="time_campeao" class="form-select form-select-lg" required>
                    <option value="" disabled selected>Selecione o Campeão...</option>
                    {% for time in times %}
                    <option value="{{ time.name }}">{{ time.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group mb-4">
                <label for="time_zebra" class="mb-2 text-muted"><strong>4. E quem será a ZEBRA (Surpresa) do torneio? 🦓</strong></label>
                <select id="time_zebra" name="time_zebra" class="form-select form-select-lg" required>
                    <option value="" disabled selected>Selecione a Zebra...</option>
                    {% for time in times %}
                    <option value="{{ time.name }}">{{ time.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <button type="submit" class="btn btn-success btn-lg w-100 mt-2 fw-bold">
                <i class="bi bi-check-circle me-2"></i>Registrar Palpites
            </button>
        </form>
    </div>
    {% endif %}
</div>
{% endblock %}
