<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção - Sistema Palpiteiros</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a2a6c, #3a7bd5, #00d2ff);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .icon {
            font-size: 4rem;
            color: #ffcc00;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: #ffcc00;
        }

        .highlight {
            color: #fff;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #e0e0e0;
        }

        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid #ffcc00;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <i class="fas fa-tools"></i>
        </div>
        
        <h1>Estamos em <span class="highlight">Manutenção</span></h1>
        
        <div style="margin-bottom: 25px;">
            <img src="https://cdn.osxdaily.com/wp-content/uploads/2013/07/dancing-banana.gif" 
                 alt="Manutenção" 
                 style="width: 90%; max-width: 100px; border-radius: 15px;">
        </div>

        <p>O <strong>Sistema Palpiteiros</strong> está passando por atualizações técnicas para garantir uma melhor experiência em seus palpites.</p>
        
        <p>Voltaremos em breve. Agradecemos a sua paciência!</p>

        <footer>
            &copy; 2024 Sistema Palpiteiros - Todos os direitos reservados.
        </footer>
    </div>
</body>
</html>
